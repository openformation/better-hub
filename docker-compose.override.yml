# Override file for self-hosted deployment.
# Docker Compose merges this automatically with docker-compose.yml,
# keeping the base file untouched for clean upstream syncs.
services:
        app:
                build:
                        context: .
                        dockerfile: Dockerfile
                container_name: better-hub-app
                restart: unless-stopped
                ports:
                        - "3000:3000"
                env_file: ./apps/web/.env
                depends_on:
                        pgbouncer:
                                condition: service_healthy
                        redis-rest:
                                condition: service_started

        pgbouncer:
                image: edoburu/pgbouncer:latest
                container_name: better-hub-pgbouncer
                restart: unless-stopped
                ports:
                        - "5433:5432"
                environment:
                        - POSTGRES_HOST=postgres
                        - POSTGRES_PORT=5432
                        - POSTGRES_DATABASE=better_hub
                        - POSTGRES_USER=postgres
                        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
                        - POOL_MODE=transaction
                        - MAX_CLIENT_CONN=100
                        - DEFAULT_POOL_SIZE=20
                        - RESERVE_POOL_SIZE=5
                        - RESERVE_POOL_TIMEOUT=5
                healthcheck:
                        test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U postgres"]
                        interval: 5s
                        timeout: 5s
                        retries: 5

        postgres:
                healthcheck:
                        test: ["CMD-SHELL", "pg_isready -U postgres"]
                        interval: 5s
                        timeout: 5s
                        retries: 5
                command: postgres -c max_connections=300
